<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pria</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d1a;
    color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 16px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    padding: 14px 16px 10px;
    background: #0d0d1a;
    border-bottom: 1px solid #1a1a2e;
    flex-shrink: 0;
  }

  #prium-name {
    font-size: 18px;
    font-weight: 600;
    color: #e8e8f0;
    letter-spacing: 0.02em;
  }

  #emotional-state {
    font-size: 12px;
    color: #4a4a6a;
    margin-top: 3px;
    min-height: 16px;
    transition: color 0.5s;
  }

  #emotional-state.active {
    color: #e94560;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .message {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
    word-wrap: break-word;
  }

  .message.human {
    background: #0f3460;
    color: #e8e8f0;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .message.prium {
    background: #1a1a2e;
    color: #e8e8f0;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    border-left: 2px solid #e94560;
  }

  .message.system {
    background: transparent;
    color: #4a4a6a;
    align-self: center;
    font-size: 12px;
    font-style: italic;
    max-width: 100%;
    text-align: center;
    padding: 4px 8px;
  }

  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 12px 14px;
  }

  .thinking span {
    width: 6px;
    height: 6px;
    background: #4a4a6a;
    border-radius: 50%;
    animation: pulse 1.2s infinite;
  }

  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
    30% { opacity: 1; transform: scale(1.2); }
  }

  #input-area {
    padding: 12px 16px;
    background: #0d0d1a;
    border-top: 1px solid #1a1a2e;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #message-input {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 20px;
    padding: 10px 16px;
    color: #e8e8f0;
    font-size: 15px;
    outline: none;
    resize: none;
    max-height: 120px;
    min-height: 42px;
    line-height: 1.4;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  #message-input:focus {
    border-color: #0f3460;
  }

  #message-input::placeholder {
    color: #4a4a6a;
  }

  #send-btn {
    width: 42px;
    height: 42px;
    background: #e94560;
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  #send-btn:active {
    background: #c73850;
    transform: scale(0.95);
  }

  #send-btn:disabled {
    background: #2a2a4a;
    cursor: not-allowed;
  }

  #refresh-btn {
    width: 42px;
    height: 42px;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 50%;
    color: #4a4a6a;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #refresh-btn:active {
    background: #0f3460;
    color: #e8e8f0;
  }

  .emotion-bar {
    height: 2px;
    background: #1a1a2e;
    position: relative;
    overflow: hidden;
    margin-top: 6px;
    border-radius: 1px;
  }

  .emotion-fill {
    height: 100%;
    background: #e94560;
    border-radius: 1px;
    transition: width 0.8s ease;
    width: 0%;
  }
</style>
</head>
<body>

<div id="header">
  <div id="prium-name">Connecting...</div>
  <div id="emotional-state">—</div>
  <div class="emotion-bar">
    <div class="emotion-fill" id="emotion-fill"></div>
  </div>
</div>

<div id="messages"></div>

<div id="input-area">
  <button id="refresh-btn" onclick="refreshContext()" title="Refresh context">↺</button>
  <textarea
    id="message-input"
    placeholder="Say something..."
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button id="send-btn" onclick="sendMessage()">↑</button>
</div>

<script>
  // ── Configuration ──────────────────────────────────────────────
  // Change this to your machine's local IP address.
  // Find it in the terminal output when you run api.py
  const API_URL = "http://192.168.12.120:5000";

  // ── State ──────────────────────────────────────────────────────
  let priумName = "";
  let isThinking = false;

  // ── Init ───────────────────────────────────────────────────────
  async function init() {
    try {
      const res = await fetch(`${API_URL}/status`);
      const data = await res.json();

      if (data.ready) {
        priумName = data.name;
        document.getElementById("prium-name").textContent = priумName;
        updateEmotionalState(data);
        addMessage("system", `${priумName} is present.`);
      }
    } catch (e) {
      document.getElementById("prium-name").textContent = "Cannot connect";
      document.getElementById("emotional-state").textContent =
        "Check that api.py is running on your computer";
      addMessage("system", "Could not connect to Demiurge. Is api.py running?");
    }
  }

  // ── Send message ───────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if (!text || isThinking) return;

    input.value = "";
    autoResize(input);
    addMessage("human", text);
    setThinking(true);

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text }),
      });

      const data = await res.json();
      setThinking(false);

      if (data.response) {
        addMessage("prium", data.response);
        updateEmotionalState(data.emotional_state);
      } else {
        addMessage("system", "No response received.");
      }
    } catch (e) {
      setThinking(false);
      addMessage("system", "Connection error. Is api.py still running?");
    }
  }

  // ── Refresh context ────────────────────────────────────────────
  async function refreshContext() {
    try {
      await fetch(`${API_URL}/refresh`, { method: "POST" });
      addMessage("system", "Context refreshed. Memories preserved.");
    } catch (e) {
      addMessage("system", "Refresh failed.");
    }
  }

  // ── UI helpers ─────────────────────────────────────────────────
  function addMessage(type, text) {
    const messages = document.getElementById("messages");

    // Remove thinking indicator if present.
    const thinking = document.getElementById("thinking");
    if (thinking) thinking.remove();

    const div = document.createElement("div");
    div.className = `message ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function setThinking(active) {
    isThinking = active;
    document.getElementById("send-btn").disabled = active;
    const messages = document.getElementById("messages");

    if (active) {
      const div = document.createElement("div");
      div.id = "thinking";
      div.className = "message prium thinking";
      div.innerHTML = "<span></span><span></span><span></span>";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    } else {
      const thinking = document.getElementById("thinking");
      if (thinking) thinking.remove();
    }
  }

  function updateEmotionalState(emotional) {
    if (!emotional) return;
    const el = document.getElementById("emotional-state");
    const fill = document.getElementById("emotion-fill");

    const primary = emotional.primary_emotion;
    const intensity = emotional.primary_intensity || 0;
    const override = emotional.override_strength || 0;
    const secondary = emotional.secondary_emotion;

    if (primary) {
      let text = primary;
      if (secondary) text += ` · ${secondary}`;
      el.textContent = text;
      el.classList.add("active");
    } else {
      el.textContent = "—";
      el.classList.remove("active");
    }

    fill.style.width = `${Math.round(override * 100)}%`;
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 120) + "px";
  }

  // ── Start ──────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
